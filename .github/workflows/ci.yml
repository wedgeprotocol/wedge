name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC — weekly fork-test backstop
  workflow_dispatch:

jobs:
  forge:
    name: forge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show forge version
        run: forge --version

      - name: Check formatting
        run: forge fmt --check src test script

      - name: Build
        run: forge build --sizes

      - name: Run unit tests
        run: forge test -vvv --no-match-contract MainnetFork

  mainnet-fork:
    name: mainnet-fork
    runs-on: ubuntu-latest
    # Runs on every push to main (catches v4-integration regressions
    # immediately post-merge), on manual dispatch, and on schedule.
    # Skipped on pull_request to keep Alchemy quota predictable —
    # use workflow_dispatch on a specific PR to run it there.
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run mainnet-fork integration tests
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
        run: forge test --match-contract MainnetFork -vvv
