name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  forge:
    name: forge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show forge version
        run: forge --version

      - name: Check formatting
        run: forge fmt --check src test script

      - name: Build
        run: forge build --sizes

      - name: Run unit tests
        run: forge test -vvv --no-match-contract MainnetFork

  mainnet-fork:
    name: mainnet-fork (weekly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch')
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run mainnet-fork integration tests
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
        run: forge test --match-contract MainnetFork -vvv
